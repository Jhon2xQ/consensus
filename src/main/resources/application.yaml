spring:
  application:
    name: consensus

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:h2:mem:consensus;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    show-sql: ${SHOW_SQL:true}

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    com.carmenio.consensus: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${HIBERNATE_SQL:DEBUG}
