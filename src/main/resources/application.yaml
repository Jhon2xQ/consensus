spring:
  application:
    name: consensus

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:consensus;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  level:
    com.carmenio.consensus: DEBUG
    org.hibernate.SQL: DEBUG
