JWKS_URI: https://test-tenant.logto.app/oidc/jwks
JWT_ISSUER: https://test-tenant.logto.app/oidc

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://test-tenant.logto.app/oidc/jwks

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
